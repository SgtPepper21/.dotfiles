# remap prefix fron <C-b> to <C-a>
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file
bind r source-file ~/.tmux.conf

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch windows using Ctrl-Tab (doesn't work...)
#bind -nb C-Tab next-window
#bind -nb C-S-Tab previous-window

# don't rename windows automatically (after being named using the ','-key)
set-option -g allow-rename off

# use 256 colour terminal (also needs 'alias tmux="tmux -2"' in the .bashrc)
set -g default-terminal "screen-256color"

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=yellow,bg=black'
set -g pane-border-status top
#set -g pane-border-format " < #{pane_index} > [ #{pane_title} - #{pane_current_command} - #{pane_current_path} ] "
set -g pane-border-format " < #{pane_index} > [ #{pane_title} - #{pane_current_path} ] "

#set -g pane-active-border-style 'fg=black,bg=yellow'
set -g pane-active-border-style 'fg=colour33,bg=black'

# statusbar
set -g status-style 'fg=yellow bold bg=default'
set -g status-position bottom
set -g status-justify centre

set -g status-left 'Session #SS - Window #{window_index}'
set -g status-left-length 50

set -g status-right-style 'fg=yellow bold bg=black'
#set -g status-right '%Y-%m-%d %H:%M '
set -g status-right '%a %d %b %H:%M [#H]'
set -g status-right-length 50

set -g window-status-format " #[fg=colour3 bold]  #I: #W       "
set -g window-status-current-format " #[fg=color1- bold,bg=default][ #I: #W (#F) ] "

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=yellow bg=default'
